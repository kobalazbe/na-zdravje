<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff6b6b" />
  <meta name="description" content="Na Zdravje! — digitalna pivska igra za 2–10 igralcev. Ena naprava, kup smeha." />
  <title>Na Zdravje! 🍻 — Pivska igra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" id="ati" href="" />
</head>
<body>
  <div id="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main id="app" aria-live="polite"></main>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <script>
    (function () {
      try {
        var c = document.createElement('canvas');
        c.width = c.height = 192;
        var x = c.getContext('2d');
        var r = 40;
        x.fillStyle = '#ff6b6b';
        x.beginPath();
        x.moveTo(r, 0); x.lineTo(192 - r, 0);
        x.arcTo(192, 0, 192, r, r); x.lineTo(192, 192 - r);
        x.arcTo(192, 192, 192 - r, 192, r); x.lineTo(r, 192);
        x.arcTo(0, 192, 0, 192 - r, r); x.lineTo(0, r);
        x.arcTo(0, 0, r, 0, r);
        x.closePath(); x.fill();
        x.font = '120px serif';
        x.textAlign = 'center';
        x.textBaseline = 'middle';
        x.fillText('🍻', 96, 100);
        document.getElementById('ati').href = c.toDataURL();
      } catch (e) { /* ignore */ }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
